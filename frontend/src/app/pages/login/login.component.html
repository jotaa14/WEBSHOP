<div class="login-container container flex justify-center items-center py-8">
      <div class="glass-panel max-w-md w-full animate-fade-in">
        <div class="text-center mb-8">
          <h2 class="text-gradient">Bem-vindo de volta</h2>
          <p class="text-muted">Acede à tua conta para continuar</p>
        </div>

        <div *ngIf="error" class="alert alert-danger">
          {{ error }}
        </div>

        <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="flex flex-col">
          <div class="form-group">
            <label class="form-label">Email</label>
            <input type="email" formControlName="email" class="form-control" placeholder="O teu email" />
            <div *ngIf="loginForm.get('email')?.touched && loginForm.get('email')?.invalid" class="text-danger mt-2 text-sm">
              Email inválido.
            </div>
          </div>

          <div class="form-group mb-6">
            <label class="form-label">Password</label>
            <input type="password" formControlName="password" class="form-control" placeholder="A tua password" />
            <div *ngIf="loginForm.get('password')?.touched && loginForm.get('password')?.invalid" class="text-danger mt-2 text-sm">
              A password é obrigatória.
            </div>
          </div>

          <button type="submit" class="btn btn-primary btn-block mb-4" [disabled]="loginForm.invalid || loading">
            <span *ngIf="!loading">Entrar na Conta</span>
            <span *ngIf="loading">A autenticar...</span>
          </button>
        </form>

        <div class="text-center mt-4">
          <p class="text-muted text-sm">Ainda não tens conta? <a routerLink="/register">Regista-te aqui</a></p>
        </div>
      </div>
    </div>
