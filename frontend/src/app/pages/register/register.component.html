<div class="register-container container flex justify-center items-center py-8">
      <div class="glass-panel max-w-2xl w-full animate-fade-in">
        <div class="text-center mb-8">
          <h2 class="text-gradient">Criar Conta</h2>
          <p class="text-muted">Junta-te à nossa plataforma</p>
        </div>

        <div *ngIf="error" class="alert alert-danger">
          {{ error }}
        </div>

        <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
          <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
            
            <div class="form-group">
              <label class="form-label">Nome Completo *</label>
              <input type="text" formControlName="name" class="form-control" />
            </div>

            <div class="form-group">
              <label class="form-label">Email *</label>
              <input type="email" formControlName="email" class="form-control" />
            </div>

            <div class="form-group">
              <label class="form-label">Telefone *</label>
              <input type="text" formControlName="phone" class="form-control" />
            </div>

            <div class="form-group">
              <label class="form-label">NIF *</label>
              <input type="text" formControlName="nif" class="form-control" />
            </div>

            <div class="form-group">
              <label class="form-label">Password *</label>
              <input type="password" formControlName="password" class="form-control" />
            </div>

            <div class="form-group">
              <label class="form-label">Confirmar Password *</label>
              <input type="password" formControlName="confirmPassword" class="form-control" />
            </div>

            <div class="form-group">
              <label class="form-label">Morada *</label>
              <input type="text" formControlName="address" class="form-control" />
            </div>

            <div class="form-group">
              <label class="form-label">Cidade *</label>
              <input type="text" formControlName="city" class="form-control" />
            </div>

            <div class="form-group">
              <label class="form-label">Distrito *</label>
              <select formControlName="district" class="form-control">
                <option value="">Selecione o Distrito</option>
                <option *ngFor="let d of districts" [value]="d">{{ d }}</option>
              </select>
            </div>

            <div class="form-group">
              <label class="form-label">Data de Nascimento *</label>
              <div class="flex gap-2">
                <input type="number" formControlName="birthDay" class="form-control" placeholder="DD" min="1" max="31" />
                <input type="number" formControlName="birthMonth" class="form-control" placeholder="MM" min="1" max="12" />
                <input type="number" formControlName="birthYear" class="form-control" placeholder="AAAA" min="1900" [max]="currentYear" />
              </div>
            </div>

          </div>

          <div class="mt-8 flex justify-between items-center">
            <a routerLink="/login" class="text-muted hover:text-primary">Já tens conta? Login</a>
            <button type="submit" class="btn btn-primary" [disabled]="registerForm.invalid || loading">
              <span *ngIf="!loading">Registar</span>
              <span *ngIf="loading">A registar...</span>
            </button>
          </div>
        </form>
      </div>
    </div>
