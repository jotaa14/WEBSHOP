<div class="container py-8">
      <h2 class="mb-6">O Meu Perfil</h2>
      
      <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
        
        <!-- Perfil Form -->
        <div class="glass-panel animate-fade-in">
          <h3 class="mb-4">Dados Pessoais</h3>
          
          <div *ngIf="profileSuccess" class="alert alert-success">Perfil atualizado com sucesso!</div>
          <div *ngIf="profileError" class="alert alert-danger">{{ profileError }}</div>
          
          <form [formGroup]="profileForm" (ngSubmit)="onUpdateProfile()">
            <div class="form-group">
              <label class="form-label">Nome Completo</label>
              <input type="text" formControlName="name" class="form-control">
            </div>
            
            <div class="form-group">
              <label class="form-label">Email (Não Editável)</label>
              <input type="email" [value]="user?.email" class="form-control" disabled>
            </div>
            
            <div class="form-group">
              <label class="form-label">Telefone</label>
              <input type="text" formControlName="phone" class="form-control">
            </div>
            
            <div class="form-group">
              <label class="form-label">Morada</label>
              <input type="text" formControlName="address" class="form-control">
            </div>
            
            <div class="grid grid-cols-2 gap-4">
              <div class="form-group">
                <label class="form-label">Cidade</label>
                <input type="text" formControlName="city" class="form-control">
              </div>
              
              <div class="form-group">
                <label class="form-label">Distrito</label>
                <select formControlName="district" class="form-control">
                  <option *ngFor="let d of districts" [value]="d">{{ d }}</option>
                </select>
              </div>
            </div>
            
            <button type="submit" class="btn btn-primary" [disabled]="profileForm.invalid || profileLoading">
              Atualizar Perfil
            </button>
          </form>
        </div>
        
        <!-- Password Form -->
        <div class="glass-panel animate-fade-in delay-100 h-fit">
          <h3 class="mb-4">Alterar Password</h3>
          
          <div *ngIf="pwdSuccess" class="alert alert-success">Password alterada com sucesso!</div>
          <div *ngIf="pwdError" class="alert alert-danger">{{ pwdError }}</div>
          
          <form [formGroup]="passwordForm" (ngSubmit)="onChangePassword()">
            <div class="form-group">
              <label class="form-label">Password Atual</label>
              <input type="password" formControlName="currentPassword" class="form-control">
            </div>
            
            <div class="form-group">
              <label class="form-label">Nova Password</label>
              <input type="password" formControlName="newPassword" class="form-control">
            </div>
            
            <div class="form-group mb-6">
              <label class="form-label">Confirmar Nova Password</label>
              <input type="password" formControlName="confirmNewPassword" class="form-control">
            </div>
            
            <button type="submit" class="btn btn-outline" [disabled]="passwordForm.invalid || pwdLoading">
              Alterar Password
            </button>
          </form>
        </div>
        
      </div>
    </div>
