<div class="star-rating flex items-center gap-1" [class.readonly]="readonly">
      <ng-container *ngFor="let star of stars; let i = index">
        <svg 
          xmlns="http://www.w3.org/2000/svg" 
          width="20" 
          height="20" 
          viewBox="0 0 24 24" 
          [class.filled]="i < currentRating"
          [class.interactive]="!readonly"
          (click)="rate(i + 1)"
          (mouseenter)="hover(i + 1)"
          (mouseleave)="resetHover()"
          fill="none" 
          stroke="currentColor" 
          stroke-width="2" 
          stroke-linecap="round" 
          stroke-linejoin="round"
        >
          <polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"></polygon>
        </svg>
      </ng-container>
      <span class="rating-text text-muted" *ngIf="showText && currentRating > 0">
        {{ currentRating | number:'1.1-1' }}
      </span>
    </div>
